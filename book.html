<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>The Quiet Volume — three.js</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,700;1,400;1,500&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    height: 100%;
    overflow: hidden;
    background: #efe6d3;
    font-family: 'Inter', -apple-system, sans-serif;
    color: #2a1f15;
  }
  canvas { display: block; }

  /* warm vignette over the scene */
  #vignette {
    position: fixed; inset: 0; pointer-events: none; z-index: 4;
    background:
      radial-gradient(ellipse at 50% 60%, transparent 35%, rgba(60, 38, 18, 0.25) 100%);
  }
  #grain {
    position: fixed; inset: 0; pointer-events: none; z-index: 5;
    opacity: 0.05; mix-blend-mode: overlay;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='200' height='200'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2' stitchTiles='stitch'/></filter><rect width='100%' height='100%' filter='url(%23n)'/></svg>");
  }

  /* HUD */
  #hud {
    position: fixed; inset: 0; z-index: 10;
    pointer-events: none;
    font-family: 'Cormorant Garamond', Georgia, serif;
    color: #2a1f15;
  }
  #hud > * { pointer-events: auto; }

  .brand {
    position: fixed; top: 28px; left: 32px;
    font-size: 11px; letter-spacing: 0.45em;
    text-transform: uppercase; opacity: 0.55;
  }
  .brand b {
    display: block; font-weight: 400; font-style: italic;
    font-size: 26px; letter-spacing: 0.02em;
    text-transform: none; margin-top: 4px;
    color: #6b4422;
  }

  .pagecount {
    position: fixed; top: 32px; right: 32px;
    font-size: 12px; letter-spacing: 0.35em; opacity: 0.55;
    font-variant-numeric: tabular-nums;
  }
  .pagecount em { font-style: italic; color: #6b4422; opacity: 0.8; padding: 0 6px; }

  .nav {
    position: fixed; bottom: 36px; left: 50%;
    transform: translateX(-50%);
    display: flex; align-items: center; gap: 8px;
    background: rgba(248, 240, 222, 0.7);
    backdrop-filter: blur(14px) saturate(140%);
    -webkit-backdrop-filter: blur(14px) saturate(140%);
    border: 1px solid rgba(107, 68, 34, 0.18);
    border-radius: 999px;
    padding: 6px;
    box-shadow: 0 18px 40px -12px rgba(60, 38, 18, 0.35);
  }
  .nav button {
    background: transparent;
    border: none;
    color: #2a1f15;
    font-family: inherit;
    font-size: 13px;
    letter-spacing: 0.28em;
    text-transform: uppercase;
    padding: 10px 22px;
    border-radius: 999px;
    cursor: pointer;
    transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1);
    display: flex; align-items: center; gap: 8px;
  }
  .nav button:hover:not(:disabled) {
    background: rgba(107, 68, 34, 0.08);
    color: #6b4422;
  }
  .nav button:disabled { opacity: 0.25; cursor: not-allowed; }
  .nav button .arrow { font-size: 16px; line-height: 1; transition: transform 0.4s; }
  .nav button:hover:not(:disabled) .arrow.l { transform: translateX(-3px); }
  .nav button:hover:not(:disabled) .arrow.r { transform: translateX(3px); }

  .nav .pages-strip {
    display: flex; gap: 5px; padding: 0 10px;
    align-items: center;
  }
  .nav .dot {
    width: 5px; height: 5px; border-radius: 50%;
    background: rgba(60, 38, 18, 0.25);
    transition: all 0.35s;
    cursor: pointer;
    border: none; padding: 0;
  }
  .nav .dot.active {
    background: #6b4422;
    width: 22px; border-radius: 3px;
  }
  .nav .dot:hover { background: rgba(60, 38, 18, 0.55); }
  .nav .dot.active:hover { background: #6b4422; }

  .hint {
    position: fixed; bottom: 36px; right: 32px;
    font-size: 10px; letter-spacing: 0.32em;
    text-transform: uppercase; opacity: 0.5;
    text-align: right; line-height: 1.8;
    font-family: 'Inter', sans-serif;
  }
  .hint kbd {
    border: 1px solid rgba(60, 38, 18, 0.3);
    padding: 1px 6px; border-radius: 3px;
    margin: 0 2px; font-size: 9px;
    color: #6b4422; font-family: inherit;
  }

  #loading {
    position: fixed; inset: 0;
    background: #efe6d3;
    display: flex; align-items: center; justify-content: center;
    flex-direction: column; gap: 24px;
    z-index: 100; transition: opacity 0.7s ease;
    font-family: 'Cormorant Garamond', serif;
  }
  #loading.hidden { opacity: 0; pointer-events: none; }
  #loading .ring {
    width: 38px; height: 38px;
    border: 1px solid rgba(107, 68, 34, 0.3);
    border-top-color: #6b4422;
    border-radius: 50%;
    animation: spin 1.4s linear infinite;
  }
  #loading .label {
    font-style: italic; letter-spacing: 0.4em;
    text-transform: uppercase; font-size: 11px;
    opacity: 0.55; color: #6b4422;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<div id="loading">
  <div class="ring"></div>
  <div class="label">opening the book…</div>
</div>

<div id="hud">
  <div class="brand">
    <span>three.js · grimoire</span>
    <b>The Quiet Volume</b>
  </div>
  <div class="pagecount">
    <span id="cur">cover</span><em>/</em><span id="tot">—</span>
  </div>
  <div class="nav">
    <button id="prev"><span class="arrow l">←</span> prev</button>
    <div class="pages-strip" id="strip"></div>
    <button id="next">next <span class="arrow r">→</span></button>
  </div>
  <div class="hint">
    <kbd>←</kbd> <kbd>→</kbd> turn pages<br>
    drag · explore the book
  </div>
</div>

<div id="vignette"></div>
<div id="grain"></div>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
  }
}
</script>

// ============================================================
//   CONSTANTS  (matched to wass08/r3f-animated-book-slider)
// ============================================================
const PAGE_WIDTH   = 1.28;

const easingFactor       = 0.5;
const easingFactorFold   = 0.3;
const insideCurveStrength  = 0.18;
const outsideCurveStrength = 0.05;
const turningCurveStrength = 0.09;

const TEX_W = 900;
const TEX_H = Math.round(TEX_W * (PAGE_HEIGHT / PAGE_WIDTH));

//   PAGE CONTENT  (HTML rendered to texture)

];

// ============================================================
//   HTML → CanvasTexture (SVG foreignObject)
// ============================================================
function htmlToTexture(html) {
  return new Promise((resolve) => {
    const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="${TEX_W}" height="${TEX_H}">
      <foreignObject width="100%" height="100%">
        <div xmlns="http://www.w3.org/1999/xhtml" class="root">
          <style>${PAGE_CSS}</style>
          ${html}
        </div>
      </foreignObject>
    </svg>`;
    const url = 'data:image/svg+xml;charset=utf-8,' + encodeURIComponent(svg);
    const img = new Image();
    img.onload = () => {
      const c = document.createElement('canvas');
      c.width = TEX_W; c.height = TEX_H;
      const ctx = c.getContext('2d');
      ctx.fillStyle = '#f5ebd2';
      ctx.fillRect(0, 0, TEX_W, TEX_H);
      ctx.drawImage(img, 0, 0, TEX_W, TEX_H);
      const t = new THREE.CanvasTexture(c);
      t.colorSpace = THREE.SRGBColorSpace;
      t.anisotropy = 16;
      t.needsUpdate = true;
      resolve(t);
    };
    img.onerror = () => {
      const c = document.createElement('canvas');
      c.width = TEX_W; c.height = TEX_H;
      const ctx = c.getContext('2d');
      ctx.fillStyle = '#f5ebd2';
      ctx.fillRect(0, 0, TEX_W, TEX_H);
      ctx.fillStyle = '#8b5a2b';
      ctx.font = '24px Georgia';
      ctx.textAlign = 'center';
      ctx.fillText('— page —', TEX_W / 2, TEX_H / 2);
      const t = new THREE.CanvasTexture(c);
      t.colorSpace = THREE.SRGBColorSpace;
      resolve(t);
    };
    img.src = url;
  });
}

// ============================================================
//   PAGE GEOMETRY (shared, with skin attributes)
// ============================================================
const pageGeometry = new THREE.BoxGeometry(
  PAGE_WIDTH, PAGE_HEIGHT, PAGE_DEPTH, PAGE_SEGMENTS, 2
);
pageGeometry.translate(PAGE_WIDTH / 2, 0, 0);

{
  const pos = pageGeometry.attributes.position;
  const v = new THREE.Vector3();
  const skinIdx = [];
  const skinW = [];
  for (let i = 0; i < pos.count; i++) {
    v.fromBufferAttribute(pos, i);
    const x = v.x;
    const skinIndex = Math.max(0, Math.floor(x / SEGMENT_WIDTH));
    const skinWeight = (x % SEGMENT_WIDTH) / SEGMENT_WIDTH;
    skinIdx.push(skinIndex, skinIndex + 1, 0, 0);
    skinW.push(1 - skinWeight, skinWeight, 0, 0);
  }
  pageGeometry.setAttribute('skinIndex', new THREE.Uint16BufferAttribute(skinIdx, 4));
  pageGeometry.setAttribute('skinWeight', new THREE.Float32BufferAttribute(skinW, 4));
}

// Procedural paper edge texture for the four "edge" sides
function makeEdgeTexture() {
  const c = document.createElement('canvas');
  c.width = 256; c.height = 256;
  const ctx = c.getContext('2d');
  // base warm cream
  const grad = ctx.createLinearGradient(0, 0, 0, 256);
  grad.addColorStop(0, '#e8d9b2');
  grad.addColorStop(0.5, '#d6c08d');
  grad.addColorStop(1, '#bfa674');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, 256, 256);
  // page lines (stack of paper edges)
  for (let i = 0; i < 256; i += 1) {
    ctx.strokeStyle = `rgba(${100 + Math.random() * 30}, ${75 + Math.random() * 25}, ${40 + Math.random() * 15}, ${0.04 + Math.random() * 0.08})`;
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(0, i);
    ctx.lineTo(256, i);
    ctx.stroke();
  }
  // subtle grain
  for (let i = 0; i < 600; i++) {
    ctx.fillStyle = `rgba(${60 + Math.random() * 40}, ${40 + Math.random() * 25}, ${15}, ${Math.random() * 0.18})`;
    ctx.fillRect(Math.random() * 256, Math.random() * 256, 1, 1);
  }
  const t = new THREE.CanvasTexture(c);
  t.colorSpace = THREE.SRGBColorSpace;
  t.wrapS = t.wrapT = THREE.RepeatWrapping;
  return t;
}
const edgeTex = makeEdgeTexture();

const edgePaperMat = new THREE.MeshStandardMaterial({
  map: edgeTex,
  color: 0xe7d5a8,
  roughness: 0.95,
  metalness: 0.0,
});

const edgeDarkMat = new THREE.MeshStandardMaterial({
  color: 0x1a1208,
  roughness: 0.85,
  metalness: 0.0,
});

// ============================================================
//   PAGE CLASS  (one SkinnedMesh + bones per page)
// ============================================================
class Page {
  constructor(number, frontTex, backTex, totalPages) {
    this.number = number;
    this.totalPages = totalPages;
    this.group = new THREE.Group();

    // Build bones
    const bones = [];
    for (let i = 0; i <= PAGE_SEGMENTS; i++) {
      const b = new THREE.Bone();
      b.position.x = i === 0 ? 0 : SEGMENT_WIDTH;
      bones.push(b);
      if (i > 0) bones[i - 1].add(b);
    }
    const skeleton = new THREE.Skeleton(bones);

    // Materials: 6 sides on the BoxGeometry
    // Index order in THREE: +x, -x, +y, -y, +z (front), -z (back)
    const isCover = (number === 0 || number === totalPages - 1);
    const frontMat = new THREE.MeshStandardMaterial({
      color: 0xffffff,
      map: frontTex,
      roughness: isCover && number === 0 ? 0.7 : 0.55,
      metalness: 0.0,
      emissive: new THREE.Color(0xff8a3a),
      emissiveIntensity: 0,
    });
    const backMat = new THREE.MeshStandardMaterial({
      color: 0xffffff,
      map: backTex,
      roughness: isCover && number === totalPages - 1 ? 0.7 : 0.55,
      metalness: 0.0,
      emissive: new THREE.Color(0xff8a3a),
      emissiveIntensity: 0,
    });

    const materials = [
      edgePaperMat,  // +x  (free edge of the page)
      edgeDarkMat,   // -x  (spine edge)
      edgePaperMat,  // +y  (top edge)
      edgePaperMat,  // -y  (bottom edge)
      frontMat,      // +z  (front face) — visible when page is closed/right
      backMat,       // -z  (back face)  — visible after page is turned
    ];

    const mesh = new THREE.SkinnedMesh(pageGeometry, materials);
    mesh.castShadow = true;
    mesh.receiveShadow = true;
    mesh.frustumCulled = false;
    mesh.add(bones[0]);
    mesh.bind(skeleton);

    this.mesh = mesh;
    this.bones = bones;
    this.skeleton = skeleton;
    this.frontMat = frontMat;
    this.backMat = backMat;

    this.group.add(mesh);
    // Stack offset along z so pages don't z-fight; will be re-set by Book each frame
    mesh.position.z = -number * PAGE_DEPTH;

    // Page-turn state
    this.lastOpened = false;
    this.turnedAt = 0;
    this.highlighted = false;
  }

  setOpened(opened) {
    if (this.lastOpened !== opened) {
      this.turnedAt = performance.now();
      this.lastOpened = opened;
    }
  }

  update(dt, currentDelayedPage, isBookClosed) {
    const opened = this.lastOpened;

    let turningTime = Math.min(400, performance.now() - this.turnedAt) / 400;
    turningTime = Math.sin(turningTime * Math.PI);

    let targetRotation = opened ? -Math.PI / 2 : Math.PI / 2;
    if (!isBookClosed) {
      targetRotation += this.number * 0.8 * Math.PI / 180;
    }

    // Restack along z based on the "delayedPage"
    this.mesh.position.z = -this.number * PAGE_DEPTH + currentDelayedPage * PAGE_DEPTH;

    // Emissive lerp for hover highlight
    const targetEmissive = this.highlighted ? 0.18 : 0;
    this.frontMat.emissiveIntensity = THREE.MathUtils.lerp(this.frontMat.emissiveIntensity, targetEmissive, 0.1);
    this.backMat.emissiveIntensity  = THREE.MathUtils.lerp(this.backMat.emissiveIntensity,  targetEmissive, 0.1);

    const bones = this.bones;
    for (let i = 0; i < bones.length; i++) {
      const target = i === 0 ? this.group : bones[i];

      const insideCurveIntensity  = i < 8  ? Math.sin(i * 0.2 + 0.25) : 0;
      const outsideCurveIntensity = i >= 8 ? Math.cos(i * 0.3 + 0.09) : 0;
      const turningIntensity = Math.sin(i * Math.PI * (1 / bones.length)) * turningTime;

      let rotationAngle =
          insideCurveStrength  * insideCurveIntensity  * targetRotation
        - outsideCurveStrength * outsideCurveIntensity * targetRotation
        + turningCurveStrength * turningIntensity      * targetRotation;

      let foldRotationAngle = THREE.MathUtils.degToRad(Math.sign(targetRotation) * 2);

      if (isBookClosed) {
        if (i === 0) {
          rotationAngle = targetRotation;
          foldRotationAngle = 0;
        } else {
          rotationAngle = 0;
          foldRotationAngle = 0;
        }
      }

      target.rotation.y = dampAngle(target.rotation.y, rotationAngle, easingFactor, dt);

      const foldIntensity = i > 8
        ? Math.sin(i * Math.PI * (1 / bones.length) - 0.5) * turningTime
        : 0;
      target.rotation.x = dampAngle(target.rotation.x, foldRotationAngle * foldIntensity, easingFactorFold, dt);
    }
  }
}

// Exponential damping toward target angle (like maath/easing.dampAngle)
function dampAngle(current, target, smoothing, dt) {
  // smoothing = "time to reach approximately the target"; we use exp decay
  const factor = 1 - Math.exp(-dt / smoothing);
  let diff = target - current;
  // wrap
  while (diff >  Math.PI) diff -= Math.PI * 2;
  while (diff < -Math.PI) diff += Math.PI * 2;
  return current + diff * factor;
}

const scene = new THREE.Scene();
scene.background = new THREE.Color(0xefe6d3);

const camera = new THREE.PerspectiveCamera(40, innerWidth / innerHeight, 0.1, 100);
camera.position.set(0.0, 0.4, 4.6);

const renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: 'high-performance' });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.setSize(innerWidth, innerHeight);
renderer.outputColorSpace = THREE.SRGBColorSpace;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.0;
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
document.body.appendChild(renderer.domElement);

// Studio environment for nice reflections + soft GI
const pmrem = new THREE.PMREMGenerator(renderer);
pmrem.compileEquirectangularShader();
scene.environment = pmrem.fromScene(new RoomEnvironment(), 0.04).texture;

// ----- LIGHTS (soft, like studio) -----
const hemi = new THREE.HemisphereLight(0xfff0d8, 0xb39370, 0.45);
scene.add(hemi);

const keyLight = new THREE.DirectionalLight(0xffe9c8, 2.5);
keyLight.position.set(2.5, 5.0, 2.5);
keyLight.castShadow = true;
keyLight.shadow.mapSize.set(2048, 2048);
keyLight.shadow.bias = -0.0001;
keyLight.shadow.camera.near = 0.1;
keyLight.shadow.camera.far = 20;
keyLight.shadow.camera.left = -3;
keyLight.shadow.camera.right = 3;
keyLight.shadow.camera.top = 3;
keyLight.shadow.camera.bottom = -3;
keyLight.shadow.radius = 4;
scene.add(keyLight);

const fillLight = new THREE.DirectionalLight(0xa8c8ff, 0.4);
fillLight.position.set(-3, 2, -2);
scene.add(fillLight);

const rimLight = new THREE.DirectionalLight(0xffd4a8, 0.6);
rimLight.position.set(0, 3, -4);
scene.add(rimLight);

// ----- SHADOW CATCHER -----
const shadowGeo = new THREE.PlaneGeometry(40, 40);
const shadowMat = new THREE.ShadowMaterial({ opacity: 0.22 });
const shadowPlane = new THREE.Mesh(shadowGeo, shadowMat);
shadowPlane.rotation.x = -Math.PI / 2;
shadowPlane.position.y = -1.5;
shadowPlane.receiveShadow = true;
scene.add(shadowPlane);

// ----- BOOK -----
const bookFloat = new THREE.Group(); // for floating animation
const bookGroup = new THREE.Group(); // children = pages
bookGroup.rotation.y = -Math.PI / 2; // open book facing camera
bookFloat.add(bookGroup);
scene.add(bookFloat);

const pages = [];

async function buildBook() {
  // Build all textures first (parallel)
  const total = SPREADS.length;
  const texPromises = [];
  for (let i = 0; i < total; i++) {
    texPromises.push(htmlToTexture(SPREADS[i].front));
    texPromises.push(htmlToTexture(SPREADS[i].back));
  }
  const tex = await Promise.all(texPromises);

  for (let i = 0; i < total; i++) {
    const front = tex[i * 2];
    const back  = tex[i * 2 + 1];
    const p = new Page(i, front, back, total);
    pages.push(p);
    bookGroup.add(p.group);
  }
}

// ============================================================
//   PAGE STATE / DELAYED PAGE LOGIC (sequential turn)
// ============================================================
let targetPage = 0;
let delayedPage = 0;

function goToPage(n) {
  targetPage = THREE.MathUtils.clamp(n, 0, SPREADS.length);
  updateUI();
}

let pageStepTimer = 0;
function stepDelayedPage(dt) {
  if (delayedPage === targetPage) return;
  pageStepTimer += dt;
  const stepInterval = Math.abs(targetPage - delayedPage) > 2 ? 0.05 : 0.15;
  if (pageStepTimer >= stepInterval) {
    pageStepTimer = 0;
    delayedPage += targetPage > delayedPage ? 1 : -1;
    playPageFlip();
    updateUI();
  }
}

// ============================================================
//   AUDIO  (synthesized page-flip)
// ============================================================
let audioCtx = null;
function ensureAudio() {
  if (!audioCtx) {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }
}
function playPageFlip() {
  if (!audioCtx) return;
  // White-noise burst with a fast envelope -> simulates paper rustle
  const dur = 0.18;
  const sr = audioCtx.sampleRate;
  const buffer = audioCtx.createBuffer(1, sr * dur, sr);
  const data = buffer.getChannelData(0);
  for (let i = 0; i < data.length; i++) {
    const t = i / data.length;
    const env = Math.exp(-t * 14) * (1 - t);
    data[i] = (Math.random() * 2 - 1) * env;
  }
  const src = audioCtx.createBufferSource();
  src.buffer = buffer;
  const filter = audioCtx.createBiquadFilter();
  filter.type = 'bandpass';
  filter.frequency.value = 2500 + Math.random() * 800;
  filter.Q.value = 0.7;
  const gain = audioCtx.createGain();
  gain.gain.value = 0.35;
  src.connect(filter); filter.connect(gain); gain.connect(audioCtx.destination);
  src.start();
}

// ============================================================
//   UI
// ============================================================
const numerals = ['cover','i','ii','iii','iv','v','back'];
function updateUI() {
  document.getElementById('cur').textContent = numerals[delayedPage] || delayedPage;
  document.getElementById('tot').textContent = numerals[SPREADS.length] || SPREADS.length;
  document.getElementById('prev').disabled = targetPage <= 0;
  document.getElementById('next').disabled = targetPage >= SPREADS.length;

  const strip = document.getElementById('strip');
  if (strip.children.length === 0) {
    for (let i = 0; i <= SPREADS.length; i++) {
      const b = document.createElement('button');
      b.className = 'dot';
      b.addEventListener('click', () => { ensureAudio(); goToPage(i); });
      strip.appendChild(b);
    }
  }
  Array.from(strip.children).forEach((d, i) => {
    d.classList.toggle('active', i === targetPage);
  });
}

document.getElementById('prev').addEventListener('click', () => { ensureAudio(); goToPage(targetPage - 1); });
document.getElementById('next').addEventListener('click', () => { ensureAudio(); goToPage(targetPage + 1); });
addEventListener('keydown', (e) => {
  if (e.key === 'ArrowRight' || e.key === ' ') { ensureAudio(); goToPage(targetPage + 1); }
  if (e.key === 'ArrowLeft')                   { ensureAudio(); goToPage(targetPage - 1); }
});

// ----- Hover / click on pages -----
const raycaster = new THREE.Raycaster();
const ndc = new THREE.Vector2();
let hovered = null;

function pickPage(e) {
  const r = renderer.domElement.getBoundingClientRect();
  ndc.x = ((e.clientX - r.left) / r.width) * 2 - 1;
  ndc.y = -((e.clientY - r.top) / r.height) * 2 + 1;
  raycaster.setFromCamera(ndc, camera);
  const meshes = pages.map(p => p.mesh);
  const hits = raycaster.intersectObjects(meshes, false);
  return hits.length ? pages.find(p => p.mesh === hits[0].object) : null;
}

renderer.domElement.addEventListener('pointermove', (e) => {
  const p = pickPage(e);
  if (p !== hovered) {
    if (hovered) hovered.highlighted = false;
    hovered = p;
    if (hovered) hovered.highlighted = true;
    document.body.style.cursor = hovered ? 'pointer' : '';
  }
});
renderer.domElement.addEventListener('click', (e) => {
  const p = pickPage(e);
  if (!p) return;
  ensureAudio();
  // If page is currently opened (its own state), clicking should close back to it; else advance to it+1
  goToPage(p.lastOpened ? p.number : p.number + 1);
});

// ----- Orbit controls -----
const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.06;
controls.enablePan = false;
controls.minDistance = 1.8;
controls.maxDistance = 6;
controls.minPolarAngle = 0.15;
controls.maxPolarAngle = Math.PI * 0.62;
controls.target.set(0, 0, 0);

// ============================================================
//   POST-PROCESSING (subtle bloom only)
// ============================================================
const composer = new EffectComposer(renderer);
composer.addPass(new RenderPass(scene, camera));
const bloom = new UnrealBloomPass(new THREE.Vector2(innerWidth, innerHeight), 0.18, 0.6, 0.92);
composer.addPass(bloom);
composer.addPass(new OutputPass());

// ============================================================
//   RESIZE
// ============================================================
addEventListener('resize', () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
  composer.setSize(innerWidth, innerHeight);
});

// ============================================================
//   LOOP
// ============================================================
const clock = new THREE.Clock();

function animate() {
  requestAnimationFrame(animate);
  const dt = Math.min(clock.getDelta(), 1 / 30);
  const t = clock.elapsedTime;

  controls.update();

  // Float animation on the whole book (like drei <Float>) — base tilt -45° back
  bookFloat.position.y = Math.sin(t * 1.4) * 0.05;
  bookFloat.rotation.x = -Math.PI / 4 + Math.sin(t * 1.0) * 0.05;
  bookFloat.rotation.y = Math.sin(t * 0.8) * 0.06;
  bookFloat.rotation.z = Math.cos(t * 0.7) * 0.03;

  // Step delayed page (sequential turn)
  stepDelayedPage(dt);

  // Update each page's state + bones
  for (const p of pages) {
    const isOpened = delayedPage > p.number;
    const isBookClosed = (delayedPage === 0) || (delayedPage === SPREADS.length);
    p.setOpened(isOpened);
    p.update(dt, delayedPage, isBookClosed);
  }

  composer.render();
}

// ============================================================
//   BOOTSTRAP
// ============================================================
(async () => {
  await buildBook();
  updateUI();
  animate();
  setTimeout(() => {
    document.getElementById('loading').classList.add('hidden');
  }, 200);
})();
